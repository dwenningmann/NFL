<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFL FA 2026 Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --primary: #013369; --accent: #d50a0a; --success: #238636; --warning: #d29922; --bg: #0d1117; --card: #161b22; }
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: var(--bg); color: #c9d1d9; margin: 0; padding: 20px; line-height: 1.5; }
        .container { max-width: 850px; margin: 0 auto; }
        
        /* Header & Controls */
        header { background: linear-gradient(135deg, var(--primary), #001a35); border-radius: 16px; padding: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #30363d; }
        .title-group h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; color: white; }
        .refresh-btn { background: var(--accent); color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 800; transition: all 0.2s; text-transform: uppercase; font-size: 0.8rem; }
        .refresh-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .refresh-btn:active { transform: scale(0.95); }

        /* Card Styling */
        .card { background: var(--card); border: 1px solid #30363d; border-radius: 12px; padding: 20px; margin-bottom: 16px; transition: border-color 0.3s, transform 0.2s; position: relative; overflow: hidden; }
        .card:hover { border-color: #58a6ff; transform: translateX(5px); }
        
        /* Badges */
        .badge { font-size: 0.65rem; padding: 5px 12px; border-radius: 6px; font-weight: 900; text-transform: uppercase; margin-bottom: 10px; display: inline-block; }
        .signing { border-left: 6px solid var(--success); }
        .badge-signing { background: var(--success); color: white; }
        .trade { border-left: 6px solid var(--warning); }
        .badge-trade { background: var(--warning); color: black; }
        .news { border-left: 6px solid #30363d; }
        .badge-news { background: #30363d; color: #8b949e; }
        .rumor { border-left: 6px solid #8957e5; }
        .badge-rumor { background: #8957e5; color: white; }

        h3 { margin: 8px 0; font-size: 1.25rem; font-weight: 700; line-height: 1.3; }
        h3 a { color: #58a6ff; text-decoration: none; transition: color 0.2s; }
        h3 a:hover { color: #79c0ff; }

        .meta { display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: #8b949e; margin-top: 15px; border-top: 1px solid #21262d; padding-top: 10px; }
        .source-pill { background: #21262d; padding: 2px 8px; border-radius: 4px; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .loading-text { text-align: center; animation: pulse 1.5s infinite; color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const FEEDS = [
            { name: 'Rumors', url: 'https://thecoldwire.com/sports/nfl/feed' },
            { name: 'PFT', url: 'https://profootballtalk.nbcsports.com/feed/' },
            { name: 'ESPN', url: 'https://www.espn.com/espn/rss/nfl/news' },
            { name: 'NFL.com', url: 'https://www.nfl.com/rss/rssnews.xml' }
        ];

        function App() {
            const [articles, setArticles] = useState([]);
            const [loading, setLoading] = useState(true);

            const analyze = (title, source) => {
                const t = title.toLowerCase();
                if (source === 'Rumors' || t.includes('rumor') || t.includes('interest')) 
                    return { type: 'rumor', label: 'Gerücht' };
                if (t.match(/trade|acquire|sends/)) 
                    return { type: 'trade', label: 'Trade' };
                if (t.match(/sign|agree|contract|deal|extend|re-sign|stay|remain|joins/)) 
                    return { type: 'signing', label: 'Signing / Deal' };
                return { type: 'news', label: 'News' };
            };

            const fetchAll = async () => {
                setLoading(true);
                let combined = [];
                for (const f of FEEDS) {
                    try {
                        const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f.url)}`);
                        const data = await res.json();
                        if (data.items) {
                            combined = [...combined, ...data.items.map(i => ({ ...i, sourceName: f.name, ts: new Date(i.pubDate).getTime() }))];
                        }
                    } catch (e) { console.error("Error", f.name); }
                }
                setArticles(combined.sort((a, b) => b.ts - a.ts));
                setLoading(false);
            };

            useEffect(() => { fetchAll(); }, []);

            return (
                <div className="container">
                    <header>
                        <div className="title-group">
                            <h1>NFL FA 2026</h1>
                            <div style={{color: 'rgba(255,255,255,0.6)', fontSize: '0.8rem'}}>Real-Time Tracker • 10. März</div>
                        </div>
                        <button className="refresh-btn" onClick={fetchAll}>
                            {loading ? 'Hole Daten...' : 'Aktualisieren'}
                        </button>
                    </header>

                    {loading && articles.length === 0 ? (
                        <div className="loading-text">Scanne Feeds nach Signings...</div>
                    ) : (
                        articles.map((a, i) => {
                            const info = analyze(a.title, a.sourceName);
                            return (
                                <div key={i} className={`card ${info.type}`}>
                                    <span className={`badge badge-${info.type}`}>{info.label}</span>
                                    <h3><a href={a.link} target="_blank" rel="noreferrer">{a.title}</a></h3>
                                    <div className="meta">
                                        <span className="source-pill">{a.sourceName}</span>
                                        <span>{new Date(a.pubDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})} Uhr</span>
                                    </div>
                                </div>
                            );
                        })
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
